services:

  mysql:
    image: mysql:8.4
    container_name: payroll-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: payroll_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 10s
      retries: 5
      interval: 10s

  backend:
    build:
      context: ./backend

    container_name: payroll-backend

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://mysql:3306/payroll_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173

    volumes:
      - payroll_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend

    container_name: payroll-frontend

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:
  mysql_data:
  payroll_uploads: